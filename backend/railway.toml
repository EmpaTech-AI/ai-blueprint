[build]
builder = "NIXPACKS"
buildCommand = "npm install --include=dev && npm run build && cp -r src/skills dist/skills"

[deploy]
startCommand = "npm start"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[volumes]]
name = "data"
mountPath = "/app/data"
