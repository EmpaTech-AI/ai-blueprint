[build]
builder = "NIXPACKS"
buildCommand = "npm install --include=dev && npm run build && cp -r src/skills dist/skills"

[deploy]
startCommand = "node dist/server.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
# Recreate stops all existing instances before starting new ones.
# Prevents mixed-build windows where old and new replicas serve concurrent jobs.
# Accepts ~30s downtime during deploys — acceptable for a B2B consulting tool.
deploymentStrategy = "recreate"

[[volumes]]
name = "data"
mountPath = "/app/data"
